name: Fancode Live Matches Scraper

on:
  schedule:
    - cron: '*/30 * * * *' # প্রতি ৩০ মিনিট পর পর রান হবে (প্রয়োজনে সময় পরিবর্তন করতে পারেন)
  workflow_dispatch: # গিটহাব থেকে ম্যানুয়ালি রান করার অপশন

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write # গিটহাবে ফাইল পুশ করার পারমিশন

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Fancode Scraper
        run: python fancode_formatter.py

      - name: Commit and Push Updated JSON
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add fancode_matches.json
          git commit -m "Auto-update: Fetched live Fancode matches" || echo "No changes to commit"
          git push
