name: 🚀 Live Sports Auto Updater

on:
  
  workflow_dispatch: 

concurrency:
  group: auto-update-repo 
  cancel-in-progress: false

jobs:
  update-playlists:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Public Repository
        uses: actions/checkout@v3

      - name: Checkout Private Scripts
        uses: actions/checkout@v3
        with:
          repository: srhady/axsportspvt
          token: ${{ secrets.PAT_TOKEN }}
          path: private_scripts

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Execute Master Script
        run: |
          python private_scripts/axsports.py

      - name: Commit and Push Playlists
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add live_sports.json playlist.m3u
          
          git commit -m "Auto Update: Playlists [skip ci]" || echo "No changes to commit"
          
          
          git pull --rebase origin main
          git push || (sleep 10 && git pull --rebase origin main && git push)
