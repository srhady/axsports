name: 🎨 Bing Match Poster Generator

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch: 

permissions:
  contents: write


concurrency:
  group: auto-update-repo 
  cancel-in-progress: false

jobs:
  build-posters:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests Pillow

      - name: Run Poster Generator Script
        run: |
          python scripts/bing_poster.py

      - name: Commit and Push Posters
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add bing_posters/
          
          git commit -m "Auto Update: Bing Match Posters [skip ci]" || echo "No changes to commit"
          
          
          git pull --rebase origin main
          git push || (sleep 10 && git pull --rebase origin main && git push)
