name: 🎨 Bing Match Poster Generator

on:
  schedule:
    # প্রতি ৩০ মিনিট পরপর রান করবে
    - cron: '*/30 * * * *'
  workflow_dispatch: # ম্যানুয়ালি রান করার বাটন

# গিটহাবে ফাইল পুশ করার পারমিশন
permissions:
  contents: write

jobs:
  build-posters:
    runs-on: ubuntu-latest

    steps:
      # ১. আপনার রিপোজিটরি চেকআউট করা
      - name: Checkout Repository
        uses: actions/checkout@v3

      # ২. পাইথন সেটআপ করা
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # ৩. প্রয়োজনীয় প্যাকেজ ইনস্টল করা
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests Pillow

      # ৪. আপনার পোস্টার মেকার স্ক্রিপ্ট রান করা (নির্দিষ্ট ফোল্ডার থেকে)
      - name: Run Poster Generator Script
        run: |
          python scripts/bing_poster.py

      # ৫. তৈরি হওয়া ছবিগুলো গিটহাবে সেভ করা
      - name: Commit and Push Posters
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # bing_posters ফোল্ডারের সব ছবি অ্যাড করা
          git add bing_posters/
          
          # [skip ci] ব্যবহার করা হয়েছে যাতে অকারণে অ্যাকশন ট্রিগার না হয়
          git commit -m "Auto Update: Bing Match Posters [skip ci]" || echo "No changes to commit"
          
          # কনফ্লিক্ট এড়ানোর জন্য pull করে নেওয়া
          git pull --rebase origin main
          
          git push
